<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGradient)" stroke="#2563EB" stroke-width="0.5" stroke-opacity="0.2"/>
  
  <!-- AP Monogram -->
  <text x="16" y="21" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="url(#textGradient)" text-anchor="middle" letter-spacing="-0.5">AP</text>
  
  <!-- Accent dot -->
  <circle cx="24" cy="24" r="1.5" fill="#2563EB"/>
</svg>
